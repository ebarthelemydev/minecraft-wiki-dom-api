							type="number"
							placeholder="255.2"
							name=""
							id=""
						/>

					<div>
						<h4>Z Coordinate</h4>

							class="whi"
							type="number"
							placeholder="126.7"
							name=""
							id=""

				<button class="spawn">SPAWN</button>
				<h3>Arena entities</h3>
				<hr />
				<table>
					<caption>
						This list describe all entities registered inside the Arena.
					</caption>
					<thead>
						<th>Entity</th>
						<th>Name</th>
						<th>X Coordinate</th>
						<th>Y Coordinate</th>
						<th>Strength</th>
						<th>del</th>
					</thead>
